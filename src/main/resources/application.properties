spring.application.name=esientradas

esiusuarios.base-url=${ESIUSUARIOS_URL}
stripe.api-key=${STRIPE_KEY}


spring.datasource.url = jdbc:mysql://localhost:3306/esientradas?serverTimezone=UTC&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&maxAllowedPacket=134217728
spring.datasource.username = root
spring.datasource.password = root

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto = update

server.error.include-message=always

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Muestra un resumen al final de cada sesión/transacción
spring.jpa.properties.hibernate.generate_statistics=true
# Mejora la legibilidad en consola
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view = false